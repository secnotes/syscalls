    <div class="controls">

            <select id="arch-filter"><option value="all" data-i18n="all">全部</option><option value="x86">x86</option><option value="x86_64">x86_64</option><option value="arm">arm</option><option value="arm64">arm64</option></select>
            <div class="stats" id="stats" data-i18n="loading">加载中...</div>
        </div>

        <div class="control-group">
            <button id="theme-toggle" class="theme-btn">🌙</button>
            <button id="lang-toggle" class="lang-btn">EN</button>
        </div>
    </div>

        function getDescription(name) {
            return syscallDescriptions[name] || "-";
        }

        // 获取系统调用声明
        function getDeclaration(name) {
            return syscallDeclarations[name] || "暂无声明信息";
        }

        // DOM 元素
        const archFilter = document.getElementById('arch-filter');
        const searchInput = document.getElementById('search');
        const tableBody = document.getElementById('syscall-body');
        const statsDiv = document.getElementById('stats');
        
        // 渲染表格
        function renderTable(syscalls) {
            tableBody.innerHTML = '';

            if (syscalls.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="no-results">${i18n[currentLang].noResults}</td></tr>`;
                return;
            }

            for (const s of syscalls) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><span class="badge arch-${s.family}">${s.arch}</span></td>
                    <td class="number">${s.number}</td>
                    <td class="name">${s.name}</td>
                    <td class="declaration">${getDeclaration(s.name)}</td>
                    <td class="description">${getDescription(s.name)}</td>
                `;
                tableBody.appendChild(row);
            }
        }

        // 更新统计信息
        function updateStats(filtered, total) {
            statsDiv.textContent = i18n[currentLang].stats(filtered, total);
        }
        
        // 过滤数据
        function filterData() {
            const arch = archFilter.value;
            const search = searchInput.value.toLowerCase().trim();

            let filtered = syscallData;

            // 按架构过滤
            if (arch !== 'all') {
                filtered = filtered.filter(s => s.arch === arch);
            }

            // 按搜索词过滤
            if (search) {
                filtered = filtered.filter(s =>
                    s.name.toLowerCase().includes(search) ||
                    s.number === search ||
                    s.number === parseInt(search).toString()
                );
            }

            updateStats(filtered.length, syscallData.length);
            renderTable(filtered);
        }

        function updateLang() {
            const texts = i18n[currentLang];
            document.title = texts.title;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (texts[key]) {
                    el.textContent = texts[key];
                }
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (texts[key]) {
                    el.placeholder = texts[key];
                }
            });
            // 更新select选项
            const archFilter = document.getElementById('arch-filter');
            archFilter.options[0].text = texts.all;
            langBtn.textContent = currentLang === 'zh' ? 'EN' : '中文';
            // 重新渲染表格和统计
            filterData();
        }

        function getDescription(name) {
            const descMap = currentLang === 'zh' ? descZh : descEn;
            return descMap[name] || '-';
        }

        langBtn.addEventListener('click', () => {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            updateLang();
        });

        // 主题切换
        const themeBtn = document.getElementById('theme-toggle');
        let currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') {
            document.body.classList.add('dark');
            themeBtn.textContent = '☀️';
        }

        themeBtn.addEventListener('click', () => {
            if (document.body.classList.contains('dark')) {
                document.body.classList.remove('dark');
                themeBtn.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            } else {
                document.body.classList.add('dark');
                themeBtn.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            }
        });

        // 事件监听
        archFilter.addEventListener('change', filterData);
        searchInput.addEventListener('input', filterData);

        // 初始渲染
        updateStats(syscallData.length, syscallData.length);
        renderTable(syscallData);
    </script>
</body>
</html>
